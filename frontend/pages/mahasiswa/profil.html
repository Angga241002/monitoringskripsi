<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Mahasiswa</title>
    <link rel="stylesheet" href="../../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../../assets/css/responsive.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div class="topbar">
        <h4>Profil Mahasiswa</h4>
        <button id="logoutBtn2" class="btn btn-danger">
          <i class="fa-solid fa-right-from-bracket"></i>
          Logout
        </button>
      </div>
      <div class="card">
        <div class="card-header">Profil Mahasiswa</div>
        <div class="card-body">
          <p>Halaman ini akan menampilkan informasi profil mahasiswa.</p>
        </div>
      </div>
    </div>
    <script src="../../assets/js/config.js"></script>
    <script>
      fetch("../../components/sidebar-mahasiswa.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("sidebar-container").innerHTML = html;
          const menu = document.getElementById("menu-profil");
          if (menu) menu.classList.add("active");
          const logoutBtn = document.getElementById("logoutBtn2");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", () => {
              localStorage.removeItem("user");
              window.location.href = "../../login.html";
            });
          }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
