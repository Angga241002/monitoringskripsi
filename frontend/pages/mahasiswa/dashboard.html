<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Mahasiswa</title>
    <link rel="stylesheet" href="../../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../../assets/css/responsive.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div class="topbar">
        <h4>Dashboard Mahasiswa</h4>
        <button id="logoutBtn2" class="btn btn-danger">
          <i class="fa-solid fa-right-from-bracket"></i>
          Logout
        </button>
      </div>
      <div class="row g-4">
        <div class="col-lg-3 col-md-6">
          <div class="card card-stat bg-primary text-white">
            <div class="card-body">
              <h6>Total Skripsi</h6>
              <div id="totalSkripsi" class="stat-value">0</div>
              <i class="fa-solid fa-book stat-icon"></i>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-md-6">
          <div class="card card-stat bg-info text-white">
            <div class="card-body">
              <h6>Total Progress</h6>
              <div id="totalProgress" class="stat-value">0</div>
              <i class="fa-solid fa-chart-line stat-icon"></i>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-md-6">
          <div class="card card-stat bg-success text-white">
            <div class="card-body">
              <h6>ACC</h6>
              <div id="totalAcc" class="stat-value">0</div>
              <i class="fa-solid fa-circle-check stat-icon"></i>
            </div>
          </div>
        </div>
        <div class="col-lg-3 col-md-6">
          <div class="card card-stat bg-danger text-white">
            <div class="card-body">
              <h6>Revisi</h6>
              <div id="totalRevisi" class="stat-value">0</div>
              <i class="fa-solid fa-rotate-left stat-icon"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="card mt-4">
        <div class="card-header">Progress Berstatus PROSES</div>
        <div class="card-body">
          <h2 id="totalProses">0</h2>
        </div>
      </div>
    </div>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
    <script>
      fetch("../../components/sidebar-mahasiswa.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("sidebar-container").innerHTML = html;
          const menu = document.getElementById("menu-dashboard");
          if (menu) {
            menu.classList.add("active");
          }
          const logoutBtn = document.getElementById("logoutBtn2");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", () => {
              localStorage.removeItem("user");
              window.location.href = "../../login.html";
            });
          }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
