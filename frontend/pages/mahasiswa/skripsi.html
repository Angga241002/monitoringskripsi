<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skripsi Mahasiswa</title>
    <link rel="stylesheet" href="../../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../../assets/css/responsive.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div class="topbar">
        <h4>Skripsi Saya</h4>
        <button id="logoutBtn2" class="btn btn-danger">
          <i class="fa-solid fa-right-from-bracket"></i>
          Logout
        </button>
      </div>
      <div class="card">
        <div class="card-header">Data Skripsi</div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-bordered">
              <thead>
                <tr>
                  <th>No</th>
                  <th>Judul</th>
                  <th>Dosen Pembimbing</th>
                  <th>Status</th>
                  <th>Tanggal Masuk</th>
                </tr>
              </thead>
              <tbody id="skripsiTable">
                <tr>
                  <td colspan="5" class="text-center">Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script>
      fetch("../../components/sidebar-mahasiswa.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("sidebar-container").innerHTML = html;
          const menu = document.getElementById("menu-skripsi");
          if (menu) menu.classList.add("active");

          const logoutBtn = document.getElementById("logoutBtn2");
          if (logoutBtn) {
            logoutBtn.addEventListener("click", () => {
              localStorage.removeItem("user");
              window.location.href = "../../login.html";
            });
          }
        });

      async function loadSkripsi() {
        try {
          const response = await fetch(BASE_URL + "/skripsi/mahasiswa");

          if (!response.ok) {
            throw new Error("Failed to fetch skripsi");
          }

          const data = await response.json();
          const tbody = document.getElementById("skripsiTable");
          tbody.innerHTML = "";

          if (!Array.isArray(data) || data.length === 0) {
            tbody.innerHTML = `
              <tr>
                <td colspan="5" class="text-center">Tidak ada data skripsi</td>
              </tr>
            `;
            return;
          }

          data.forEach((item, index) => {
            tbody.innerHTML += `
              <tr>
                <td>${index + 1}</td>
                <td>${item.judul ?? "-"}</td>
                <td>${item.dosenNama ?? item.dosen ?? "-"}</td>
                <td>${item.status ?? "-"}</td>
                <td>${item.tanggalMasuk ?? item.tanggal ?? "-"}</td>
              </tr>
            `;
          });
        } catch (error) {
          console.error(error);
          document.getElementById("skripsiTable").innerHTML = `
            <tr>
              <td colspan="5" class="text-center text-danger">Gagal memuat data skripsi</td>
            </tr>
          `;
        }
      }

      loadSkripsi();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
