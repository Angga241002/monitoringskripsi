<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Bimbingan Skripsi</title>

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/responsive.css}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div th:replace="fragments/sidebar-dosen :: sidebar"></div>

    <div class="main-content">
      <div class="topbar">
        <h4>Data Bimbingan Skripsi</h4>
      </div>

      <div class="card">
        <div class="card-body">
          <table class="table table-bordered table-hover">
            <thead>
              <tr>
                <th>No</th>

                <th>Mahasiswa</th>

                <th>NIM</th>

                <th>Judul Skripsi</th>

                <th>Status</th>

                <th>Aksi</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="skripsi, no : ${skripsiList}">
                <td th:text="${no.count}"></td>

                <td th:text="${skripsi.mahasiswa.nama}"></td>

                <td th:text="${skripsi.mahasiswa.nim}"></td>

                <td th:text="${skripsi.judul}"></td>

                <td>
                  <span class="badge bg-primary"> Aktif </span>
                </td>

                <td>
                  <a
                    class="btn btn-primary btn-sm"
                    th:href="@{'/dosen/bimbingan/' + ${skripsi.id}}"
                  >
                    Detail
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
