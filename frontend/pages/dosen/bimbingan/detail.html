<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Detail Bimbingan</title>

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div th:replace="fragments/sidebar-dosen :: sidebar"></div>

    <div class="main-content">
      <div class="topbar">
        <h4>Detail Bimbingan</h4>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h5 th:text="${skripsi.judul}"></h5>

          <hr />

          <p>
            <b>Mahasiswa :</b>

            <span th:text="${skripsi.mahasiswa.nama}"></span>
          </p>

          <p>
            <b>NIM :</b>

            <span th:text="${skripsi.mahasiswa.nim}"></span>
          </p>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Riwayat Progress</div>

        <div class="card-body">
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>No</th>

                <th>Tanggal</th>

                <th>Keterangan</th>

                <th>Status</th>

                <th>Komentar</th>

                <th>Aksi</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="progress,no : ${progressList}">
                <td th:text="${no.count}"></td>

                <td th:text="${progress.tanggal}"></td>

                <td th:text="${progress.keterangan}"></td>

                <td>
                  <span class="badge bg-info" th:text="${progress.status}">
                  </span>
                </td>

                <td th:text="${progress.komentarDosen}"></td>

                <td>
                  <a
                    class="btn btn-warning btn-sm"
                    th:href="@{/dosen/bimbingan/review/{id}(id=${progress.id})}"
                  >
                    <i class="fa fa-pen"></i>
                    Review
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
