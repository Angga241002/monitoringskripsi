<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tambah Mahasiswa</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../../assets/css/responsive.css" />
  </head>

  <body>
    <div id="sidebar-container"></div>
    <div class="overlay" id="overlay"></div>

    <!-- MAIN -->

    <div class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-primary d-lg-none" id="toggleSidebar">
            <i class="fa-solid fa-bars"></i>
          </button>

          <h3 class="m-0">Tambah Mahasiswa</h3>
        </div>

        <button class="btn btn-danger" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          Logout
        </button>
      </div>

      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Form Tambah Mahasiswa</h5>
        </div>

        <div class="card-body">
          <form id="formMahasiswa">
            <div class="mb-3">
              <label>NIM</label>
              <input type="text" id="nim" class="form-control" required />
            </div>

            <div class="mb-3">
              <label>Nama Mahasiswa</label>
              <input type="text" id="nama" class="form-control" required />
            </div>

            <div class="mb-3">
              <label>Email</label>
              <input type="email" id="email" class="form-control" required />
            </div>

            <div class="mb-3">
              <label>Program Studi</label>
              <input type="text" id="prodi" class="form-control" required />
            </div>

            <div class="mb-4">
              <label>Angkatan</label>
              <input
                type="number"
                id="angkatan"
                class="form-control"
                required
              />
            </div>

            <button class="btn btn-success" type="submit">
              <i class="fa-solid fa-floppy-disk"></i>
              Simpan
            </button>

            <a href="mahasiswa.html" class="btn btn-secondary">
              <i class="fa-solid fa-arrow-left"></i>
              Kembali
            </a>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        fetch("../../components/sidebar-dosen.html")
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("sidebar-container").innerHTML = html;
            const menu = document.getElementById("menu-mahasiswa");
            if (menu) menu.classList.add("active");

            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
              logoutBtn.addEventListener("click", () => {
                localStorage.removeItem("user");
                window.location.href = "../../login.html";
              });
            }

            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("overlay");
            const toggle = document.getElementById("toggleSidebar");
            if (toggle) {
              toggle.onclick = () => {
                sidebar.classList.toggle("show");
                overlay.classList.toggle("show");
              };
            }
          });
      });

      document.getElementById("formMahasiswa").addEventListener("submit", async function (e) {
        e.preventDefault();

        const mahasiswa = {
          nim: document.getElementById("nim").value,
          nama: document.getElementById("nama").value,
          email: document.getElementById("email").value,
          prodi: document.getElementById("prodi").value,
          angkatan: parseInt(document.getElementById("angkatan").value, 10),
        };

        try {
          const response = await fetch(BASE_URL + "/mahasiswa", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(mahasiswa),
          });

          if (!response.ok) {
            throw new Error();
          }

          alert("Mahasiswa berhasil ditambahkan.");
          window.location.href = "mahasiswa.html";
        } catch (e) {
          console.error(e);
          alert("Gagal menyimpan data.");
        }
      });
    </script>
  </body>
</html>
