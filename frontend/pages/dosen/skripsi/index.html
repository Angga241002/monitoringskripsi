<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Data Skripsi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />

    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  </head>

  <body>
    <div th:replace="fragments/sidebar-dosen :: sidebar"></div>

    <div class="main-content">
      <div class="topbar">
        <h3>
          <i class="fa-solid fa-book-open"></i>
          Data Skripsi
        </h3>
      </div>

      <div class="card shadow">
        <div
          class="card-header bg-primary text-white d-flex justify-content-between"
        >
          <h5 class="mb-0">Daftar Skripsi Mahasiswa</h5>
        </div>

        <div class="d-flex justify-content-between mb-3">
          <form method="get" th:action="@{/dosen/skripsi}" class="d-flex">
            <input
              type="text"
              class="form-control me-2"
              name="keyword"
              th:value="${keyword}"
              placeholder="Cari judul skripsi"
            />

            <button class="btn btn-primary">Cari</button>
          </form>

          <a th:href="@{/dosen/skripsi/tambah}" class="btn btn-success">
            + Tambah Skripsi
          </a>
        </div>

        <div class="card-body">
          <table class="table table-bordered table-striped">
            <thead>
              <tr>
                <th>No</th>

                <th>Mahasiswa</th>

                <th>Dosen</th>

                <th>Judul</th>

                <th>Status</th>

                <th>Tanggal</th>

                <th>Aksi</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="skripsi, stat : ${skripsiList}">
                <td th:text="${stat.count}"></td>

                <td th:text="${skripsi.mahasiswa.nama}"></td>

                <td th:text="${skripsi.dosen.nama}"></td>

                <td th:text="${skripsi.judul}"></td>

                <td th:text="${skripsi.status}"></td>

                <td th:text="${skripsi.tanggalMulai}"></td>

                <td>
                  <a
                    th:href="@{'/dosen/skripsi/edit/' + ${skripsi.id}}"
                    class="btn btn-warning btn-sm"
                  >
                    Edit
                  </a>

                  <a
                    th:href="@{'/dosen/skripsi/hapus/' + ${skripsi.id}}"
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('Yakin ingin menghapus data ini?');"
                  >
                    Hapus
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
