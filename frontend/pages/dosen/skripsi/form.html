<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Form Skripsi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3>Form Data Skripsi</h3>
        </div>

        <div class="card-body">
          <form
            th:action="@{/dosen/skripsi/simpan}"
            th:object="${skripsi}"
            method="post"
          >
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
              <label class="form-label"> Judul Skripsi </label>

              <input
                class="form-control"
                type="text"
                th:field="*{judul}"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label"> Mahasiswa </label>

              <select class="form-select" name="mahasiswaId" required>
                <option value="">Pilih Mahasiswa</option>

                <option
                  th:each="m : ${mahasiswaList}"
                  th:value="${m.id}"
                  th:text="${m.nama}"
                ></option>

                <option
                  th:each="m : ${mahasiswaList}"
                  th:value="${m.id}"
                  th:text="${m.nama}"
                ></option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label"> Dosen Pembimbing </label>

              <select class="form-select" name="dosenId">
                <option value="">Pilih Dosen</option>

                <option
                  th:each="d : ${dosenList}"
                  th:value="${d.id}"
                  th:text="${d.nama}"
                ></option>
              </select>
            </div>

            <div class="mb-3">
              <label>Status</label>

              <select class="form-select" th:field="*{status}">
                <option value="PROSES">PROSES</option>

                <option value="ACC">ACC</option>

                <option value="REVISI">REVISI</option>
              </select>
            </div>

            <div class="mb-3">
              <label>Tanggal Mulai</label>

              <input
                type="date"
                class="form-control"
                th:field="*{tanggalMulai}"
              />
            </div>

            <button class="btn btn-success">Simpan</button>

            <a th:href="@{/dosen/skripsi}" class="btn btn-secondary">
              Kembali
            </a>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
