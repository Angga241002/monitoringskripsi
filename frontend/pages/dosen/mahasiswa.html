<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Data Mahasiswa</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../../assets/css/responsive.css" />
  </head>

  <body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <div class="main-content">
      <!-- Topbar -->
      <div class="topbar">
        <div>
          <h4 class="mb-0">
            <i class="fa-solid fa-user-graduate"></i>
            Data Mahasiswa
          </h4>
        </div>

          <div class="d-flex gap-2">
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Cari mahasiswa..."
            style="width: 250px"
          />

          <button
            class="btn btn-success"
            id="btnTambahMahasiswa"
          >
            <i class="fa-solid fa-plus"></i>
            Tambah
          </button>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <div class="card-header">
          <i class="fa-solid fa-users"></i>

          Daftar Mahasiswa
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-bordered table-hover">
              <thead class="table-primary">
                <tr>
                  <th width="60">No</th>

                  <th>NIM</th>

                  <th>Nama</th>

                  <th>Email</th>

                  <th>Prodi</th>

                  <th>Angkatan</th>

                  <th width="180">Aksi</th>
                </tr>
              </thead>

              <tbody id="tableMahasiswa">
                <tr>
                  <td colspan="7" class="text-center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Config -->
    <script src="../../assets/js/config.js"></script>

    <!-- Mahasiswa -->
    <script src="../../assets/js/mahasiswa.js"></script>

    <!-- Create/Edit Modal -->
    <div class="modal fade" id="mahasiswaModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="mahasiswaModalTitle">Form Mahasiswa</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="formMahasiswaModal">
              <input type="hidden" id="modalMahasiswaId" />
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>NIM</label>
                  <input type="text" id="modalNim" class="form-control" required />
                </div>
                <div class="col-md-6 mb-3">
                  <label>Nama</label>
                  <input type="text" id="modalNama" class="form-control" required />
                </div>
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>Email</label>
                  <input type="email" id="modalEmail" class="form-control" />
                </div>
                <div class="col-md-3 mb-3">
                  <label>Prodi</label>
                  <input type="text" id="modalProdi" class="form-control" />
                </div>
                <div class="col-md-3 mb-3">
                  <label>Angkatan</label>
                  <input type="number" id="modalAngkatan" class="form-control" />
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="button" class="btn btn-primary" id="modalSaveBtn">Simpan</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
