<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Monitoring Progress</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../../../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../../../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../../../assets/css/responsive.css" />
  </head>

  <body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Topbar -->
      <div class="topbar">
        <h3>
          <i class="fa-solid fa-chart-line"></i>
          Monitoring Progress Skripsi
        </h3>

        <button class="btn btn-danger" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          Logout
        </button>
      </div>

      <!-- Card -->
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <i class="fa-solid fa-list-check"></i>

          Data Progress Mahasiswa
        </div>

        <div class="card-body">
          <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>No</th>
                <th>Mahasiswa</th>
                <th>Judul Skripsi</th>
                <th>BAB</th>
                <th width="180">Progress</th>
                <th>Status</th>
                <th>Tanggal</th>
                <th width="130">Aksi</th>
              </tr>
            </thead>

            <tbody id="progressTable">
              <tr>
                <td colspan="8" class="text-center">Memuat data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Config -->
    <script src="../../../assets/js/config.js"></script>

    <!-- Load Sidebar -->
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // cek login
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
          window.location.href = "../../../login.html";
          return;
        }

        // load sidebar
        const sidebar = await fetch("../../../components/sidebar-dosen.html");

        document.getElementById("sidebar-container").innerHTML =
          await sidebar.text();

        // tampilkan nama dosen bila ada
        const nama = document.getElementById("namaDosen");

        if (nama) {
          nama.innerText = user.nama;
        }

        // aktifkan menu Monitoring Progress
        const menuProgress = document.getElementById("menu-progress");

        if (menuProgress) {
          menuProgress.classList.add("active");
        }

        // logout
        const logout = document.getElementById("logoutBtn2");

        if (logout) {
          logout.onclick = function () {
            localStorage.removeItem("user");
            location.href = "../../../login.html";
          };
        }

        // ambil data progress
        loadProgress();
      });

      // tombol logout topbar
      document.getElementById("logoutBtn").onclick = function () {
        localStorage.removeItem("user");

        location.href = "../../../login.html";
      };
    </script>

    <!-- Progress JS -->
    <script src="../../../assets/js/progress.js"></script>
  </body>
</html>
