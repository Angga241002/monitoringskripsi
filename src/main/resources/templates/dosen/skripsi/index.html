<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Data Skripsi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h2>Data Skripsi</h2>

      <hr />

      <a
        th:href="@{'/dosen/progress/tambah/' + ${skripsiId}}"
        class="btn btn-primary mb-3"
      >
        + Tambah Progress
      </a>

      <table class="table table-bordered table-striped">
        <thead class="table-primary">
          <tr>
            <th>No</th>

            <th>Mahasiswa</th>

            <th>Judul</th>

            <th>Dosen</th>

            <th>Status</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="skripsi, stat : ${skripsiList}">
            <td th:text="${stat.count}"></td>

            <td th:text="${skripsi.mahasiswa.nama}"></td>

            <td th:text="${skripsi.judul}"></td>

            <td th:text="${skripsi.dosen.nama}"></td>

            <td th:text="${skripsi.status}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
