<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Tambah Mahasiswa</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/responsive.css}" />
  </head>

  <body>
    <!-- SIDEBAR -->

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>🎓 Monitoring Skripsi</h3>
      </div>

      <div class="sidebar-menu">
        <a th:href="@{/dosen/dashboard}">
          <i class="fa-solid fa-house"></i>
          Dashboard
        </a>

        <a th:href="@{/dosen/mahasiswa}" class="active">
          <i class="fa-solid fa-user-graduate"></i>
          Data Mahasiswa
        </a>

        <a href="#">
          <i class="fa-solid fa-book-open"></i>
          Data Skripsi
        </a>

        <a href="#">
          <i class="fa-solid fa-chart-line"></i>
          Monitoring Progress
        </a>

        <a href="#">
          <i class="fa-solid fa-comments"></i>
          Bimbingan
        </a>

        <a href="#">
          <i class="fa-solid fa-file-lines"></i>
          Laporan
        </a>

        <a href="#">
          <i class="fa-solid fa-user"></i>
          Profil
        </a>
      </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <!-- MAIN -->

    <div class="main-content">
      <!-- TOPBAR -->

      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-primary d-lg-none" id="toggleSidebar">
            <i class="fa-solid fa-bars"></i>
          </button>

          <h3 class="m-0">Tambah Mahasiswa</h3>
        </div>

        <div th:if="${error}" class="alert alert-danger">
          <i class="fa-solid fa-circle-exclamation"></i>

          <span th:text="${error}"></span>
        </div>
        <form th:action="@{/logout}" method="post">
          <button class="btn btn-danger">
            <i class="fa-solid fa-right-from-bracket"></i>

            Logout
          </button>
        </form>
      </div>

      <!-- FORM -->

      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Form Tambah Mahasiswa</h5>
        </div>

        <div class="card-body">
          <form
            th:action="@{/dosen/mahasiswa/simpan}"
            method="post"
            th:object="${mahasiswa}"
          >
            <div class="mb-3">
              <label class="form-label"> NIM </label>

              <input
                type="text"
                class="form-control"
                th:field="*{nim}"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label"> Nama Mahasiswa </label>

              <input
                type="text"
                class="form-control"
                th:field="*{nama}"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label"> Email </label>

              <input
                type="email"
                class="form-control"
                th:field="*{email}"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label"> Program Studi </label>

              <input
                type="text"
                class="form-control"
                th:field="*{prodi}"
                required
              />
            </div>

            <div class="mb-4">
              <label class="form-label"> Angkatan </label>

              <input
                type="number"
                class="form-control"
                th:field="*{angkatan}"
                required
              />
            </div>

            <button class="btn btn-success">
              <i class="fa-solid fa-floppy-disk"></i>

              Simpan
            </button>

            <a th:href="@{/dosen/mahasiswa}" class="btn btn-secondary">
              <i class="fa-solid fa-arrow-left"></i>

              Kembali
            </a>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        const toggle = document.getElementById("toggleSidebar");

        if (toggle) {
          toggle.addEventListener("click", function () {
            sidebar.classList.toggle("show");
            overlay.classList.toggle("show");
          });
        }

        overlay.addEventListener("click", function () {
          sidebar.classList.remove("show");
          overlay.classList.remove("show");
        });
      });
    </script>
  </body>
</html>
