<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Data Mahasiswa</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/responsive.css}" />
  </head>

  <body>
    <!-- ================= SIDEBAR ================= -->

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>🎓 Monitoring Skripsi</h3>
      </div>

      <div class="sidebar-menu">
        <a th:href="@{/dosen/dashboard}">
          <i class="fa-solid fa-house"></i>
          Dashboard
        </a>

        <a th:href="@{/dosen/mahasiswa}" class="active">
          <i class="fa-solid fa-user-graduate"></i>
          Data Mahasiswa
        </a>

        <a href="#">
          <i class="fa-solid fa-book-open"></i>
          Data Skripsi
        </a>

        <a href="#">
          <i class="fa-solid fa-chart-line"></i>
          Monitoring Progress
        </a>

        <a href="#">
          <i class="fa-solid fa-comments"></i>
          Bimbingan
        </a>

        <a href="#">
          <i class="fa-solid fa-file-lines"></i>
          Laporan
        </a>

        <a href="#">
          <i class="fa-solid fa-user"></i>
          Profil
        </a>
      </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <!-- ================= MAIN ================= -->

    <div class="main-content">
      <!-- TOPBAR -->

      <div class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-primary d-lg-none" id="toggleSidebar">
            <i class="fa-solid fa-bars"></i>
          </button>

          <h3 class="m-0">Data Mahasiswa</h3>
        </div>

        <form th:action="@{/logout}" method="post">
          <button class="btn btn-danger">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
          </button>
        </form>
      </div>

      <!-- CARD -->

      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Daftar Mahasiswa</h5>

            <a th:href="@{/dosen/mahasiswa/tambah}" class="btn btn-light">
              <i class="fa-solid fa-plus"></i>

              Tambah Mahasiswa
            </a>
          </div>
        </div>

        <div class="card-body">
          <!-- SEARCH -->

          <form
            method="get"
            th:action="@{/dosen/mahasiswa}"
            class="row g-2 mb-4"
          >
            <div class="col-md-5">
              <input
                type="text"
                class="form-control"
                name="keyword"
                placeholder="Cari nama mahasiswa..."
                th:value="${keyword}"
              />
            </div>

            <div class="col-md-auto">
              <button class="btn btn-primary">
                <i class="fa fa-search"></i>

                Cari
              </button>
            </div>
          </form>

          <!-- TABLE -->

          <div class="table-responsive">
            <div
              th:if="${success}"
              class="alert alert-success alert-dismissible fade show"
            >
              <i class="fa-solid fa-circle-check"></i>

              <span th:text="${success}"></span>

              <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div
              th:if="${error}"
              class="alert alert-danger alert-dismissible fade show"
            >
              <i class="fa-solid fa-circle-xmark"></i>

              <span th:text="${error}"></span>

              <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <table class="table table-bordered table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th>No</th>
                  <th>NIM</th>
                  <th>Nama</th>
                  <th>Email</th>
                  <th>Program Studi</th>
                  <th>Angkatan</th>
                  <th width="180">Aksi</th>
                </tr>
              </thead>

              <tbody>
                <tr th:each="m, stat : ${listMahasiswa}">
                  <td th:text="${stat.count}"></td>

                  <td th:text="${m.nim}"></td>

                  <td th:text="${m.nama}"></td>

                  <td th:text="${m.email}"></td>

                  <td th:text="${m.prodi}"></td>

                  <td th:text="${m.angkatan}"></td>

                  <td>
                    <a
                      th:href="@{'/dosen/mahasiswa/edit/' + ${m.id}}"
                      class="btn btn-warning btn-sm"
                    >
                      <i class="fa fa-edit"></i>
                    </a>

                    <a
                      th:href="@{'/dosen/mahasiswa/hapus/' + ${m.id}}"
                      class="btn btn-danger btn-sm"
                      onclick="
                        return confirm('Yakin ingin menghapus data ini?');
                      "
                    >
                      <i class="fa fa-trash"></i>
                    </a>
                  </td>
                </tr>

                <tr th:if="${#lists.isEmpty(listMahasiswa)}">
                  <td colspan="7" class="text-center">
                    Belum ada data mahasiswa.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        const toggle = document.getElementById("toggleSidebar");

        if (toggle) {
          toggle.addEventListener("click", function () {
            sidebar.classList.toggle("show");
            overlay.classList.toggle("show");
          });
        }

        overlay.addEventListener("click", function () {
          sidebar.classList.remove("show");
          overlay.classList.remove("show");
        });
      });
    </script>
  </body>
</html>
