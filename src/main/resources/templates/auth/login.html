<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Login Monitoring Skripsi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body>
    <div class="login-card">
      <div class="logo">
        <h2>🎓 Monitoring Skripsi</h2>

        <p>Sistem Informasi Monitoring Progres dan Bimbingan Skripsi</p>
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label>Username</label>

          <input type="text" class="form-control" name="username" required />
        </div>

        <div class="mb-3">
          <label>Password</label>

          <input
            type="password"
            class="form-control"
            name="password"
            required
          />
        </div>

        <button class="btn btn-primary btn-login">Login</button>
      </form>

      <div th:if="${param.error}" class="alert alert-danger mt-3">
        Username atau Password salah
      </div>

      <div th:if="${param.logout}" class="alert alert-success mt-3">
        Berhasil Logout
      </div>

      <div class="footer">© 2026 Monitoring Skripsi</div>
    </div>
  </body>
</html>
